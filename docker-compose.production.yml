# docker-compose.production.yml
# Продакшн-конфигурация: контейнеры запускаются из готовых образов с Docker Hub,
# а не собираются локально (build → image).

volumes:
  pg_data_production:
  static_volume:

services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data_production:/var/lib/postgresql/data
  backend:
    image: alexeyzemtsov/taski_backend  # Качаем с Docker Hub
    env_file: .env
    depends_on:
      - db
    volumes:
      - static_volume:/backend_static
  frontend:
    image: alexeyzemtsov/taski_frontend  # Качаем с Docker Hub
    env_file: .env
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static_volume:/frontend_static
  gateway:
    image: alexeyzemtsov/taski_gateway  # Качаем с Docker Hub
    env_file: .env
    # Nginx резолвит upstream "backend" при старте → шлюз после backend
    depends_on:
      - backend
    volumes:
      - static_volume:/staticfiles/
    ports:
      - 8000:80
