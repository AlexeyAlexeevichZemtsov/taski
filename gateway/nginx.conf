# Файл nginx.conf
server {
  listen 80;

  # Запросы по адресам /api/... перенаправляй в контейнер backend
  location /api/ {
    # При перенаправлении запроса в контейнер backend
    # подменить адрес "backend" в заголовке запроса
    # на тот адрес, который пользователь ввёл в браузере
    proxy_set_header Host $http_host;
    proxy_pass http://backend:8000/api/;
  }
  location /admin/ {
    proxy_set_header Host $http_host;
    proxy_pass http://backend:8000/admin/;
  }

  # Все остальные запросы (включая главную страницу) Nginx
  # обслуживает сам, раздавая статику из /staticfiles/
  location / {
    alias /staticfiles/;
    index index.html;
  }
}
